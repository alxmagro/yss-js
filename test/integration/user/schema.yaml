$required: [id, username, email, roles, profile]

id:       String (uuid)
username: String {3, 30}
email:    String (email)
roles:
  $type: Set
  $item: String [jedi, sith, senator, pilot, bounty_hunter]

profile:
  $required: [displayName]

  displayName: String {2, 60}
  homeworld:   String
  age:         Integer {>= 0, <= 900}

deletedAt: String | null
