$required: [orderId, createdAt, status, customer, items]

orderId:   String (uuid)
createdAt: String (date-time)
status:    String [pending, processing, shipped, delivered]

customer:
  $strict: true
  $required: [name, email]

  name:    String {2, 80}
  email:   String (email)

items:
  $type: List
  $min: 1
  $item:
    $required: [productId, name, qty, price]

    productId: Integer {>= 1}
    name:      String {1, 100}
    qty:       Integer {>= 1, <= 999}
    price:     Float {>= 0.01}

notes: String
