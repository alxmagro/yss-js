feature: Format validation — hostname and idn-hostname

given:
  host:
    $type: String
    $format: hostname
  idn_host:
    $type: String
    $format: idn-hostname

scenarios:
  - name: valid values
    when:
      host: example.com
      idn_host: münchen.de
    then: []

  - name: optional fields absent
    when: {}
    then: []

  - name: invalid hostname
    when:
      host: "not a hostname!"
    then:
      - path: host
        code: "{{ CODE_FORMAT_INVALID }}"
        message: Value does not match required format
        data:
          value: "not a hostname!"
          format: hostname

  - name: invalid idn-hostname
    when:
      idn_host: "not a hostname!"
    then:
      - path: idn_host
        code: "{{ CODE_FORMAT_INVALID }}"
        message: Value does not match required format
        data:
          value: "not a hostname!"
          format: idn-hostname
