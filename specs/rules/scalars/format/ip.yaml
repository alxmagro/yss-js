feature: Format validation — ipv4 and ipv6

given:
  ipv4: string, ~ ipv4
  ipv6:
    $type: string
    $format: ipv6

scenarios:
  - name: optional fields absent
    when: {}
    then: []

  - name: valid values
    when:
      ipv4: 192.168.0.1
      ipv6: "2001:db8::1"
    then: []

  - name: invalid ipv4
    when:
      ipv4: 999.999.999.999
    then:
      - path: ipv4
        code: "{{ CODE_FORMAT_INVALID }}"
        message: Value does not match required format
        data:
          value: 999.999.999.999
          format: ipv4

  - name: invalid ipv6
    when:
      ipv6: not-an-ip
    then:
      - path: ipv6
        code: "{{ CODE_FORMAT_INVALID }}"
        message: Value does not match required format
        data:
          value: not-an-ip
          format: ipv6
