feature: Format validation — raw regex and $patterns

given:
  $patterns:
    phone: '/^\+?[\d\s\-]{7,20}$/'

  code:
    $type: string
    $format: /^[A-Z]{3}-\d{4}$/
  phone:
    $type: string
    $format: phone
  pattern:
    $type: string
    $format: regex

scenarios:
  - name: optional fields absent
    when: {}
    then: []

  - name: valid values
    when:
      code: ABC-1234
      phone: "+55 11 91234-5678"
      pattern: "[a-z]+"
    then: []

  - name: invalid raw regex
    when:
      code: abc-1234
    then:
      - path: code
        code: "{{ CODE_FORMAT }}"
        message: Value does not match required format
        data:
          value: abc-1234
          format: /^[A-Z]{3}-\d{4}$/

  - name: invalid pattern
    when:
      phone: "123"
    then:
      - path: phone
        code: "{{ CODE_FORMAT }}"
        message: Value does not match required format
        data:
          value: "123"
          format: phone

  - name: invalid regex alias value
    when:
      pattern: "[invalid"
    then:
      - path: pattern
        code: "{{ CODE_FORMAT }}"
        message: Value does not match required format
        data:
          value: "[invalid"
          format: regex

  - name: invalid $patterns syntax
    given:
      $patterns:
        phone: 'no-slashes'
      field:
        $type: string
        $format: phone
    then_throws: '$patterns: "phone" must be a /regex/ string'
