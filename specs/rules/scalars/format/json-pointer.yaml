feature: Format validation — json-pointer

given:
  pointer:
    $type: string
    $format: json-pointer

scenarios:
  - name: optional absent
    when: {}
    then: []

  - name: valid root pointer
    when:
      pointer: ""
    then: []

  - name: valid pointer
    when:
      pointer: /foo/bar/0
    then: []

  - name: valid pointer with escaped chars
    when:
      pointer: /foo~0bar/baz~1qux
    then: []

  - name: invalid pointer
    when:
      pointer: foo/bar
    then:
      - path: pointer
        code: "{{ CODE_FORMAT }}"
        message: Value does not match required format
        data:
          format: json-pointer
