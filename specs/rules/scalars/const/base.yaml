feature: Const validation — basic

given:
  role: any, == admin
  version:
    $type: integer
    $const: 2

scenarios:
  - name: optional fields absent
    when: {}
    then: []

  - name: values match const
    when:
      role: admin
      version: 2
    then: []

  - name: wrong value
    when:
      role: user
    then:
      - path: role
        code: "{{ CODE_CONST }}"
        message: Value must be `admin`
        data:
          value: user
          const: admin

  - name: type validation takes precedence over const
    when:
      version: "2"
    then:
      - path: version
        code: "{{ CODE_TYPE }}"
        message: Unexpected type
        data:
          value: "2"
          expected: integer
