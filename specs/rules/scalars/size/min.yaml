feature: Size validation — minimum size

given:
  name: string, size [2, ~]
  tags:
    $type: array
    $size: [1, ~]

scenarios:
  - name: optional fields absent
    when: {}
    then: []

  - name: string at minimum
    when:
      name: hi
    then: []

  - name: string above minimum
    when:
      name: hello world
    then: []

  - name: array at minimum
    when:
      tags: [a]
    then: []

  - name: string below minimum
    when:
      name: h
    then:
      - path: name
        code: "{{ CODE_SIZE_MIN }}"
        message: Minimum size is `2`
        data:
          min: 2

  - name: empty array below minimum
    when:
      tags: []
    then:
      - path: tags
        code: "{{ CODE_SIZE_MIN }}"
        message: Minimum size is `1`
        data:
          min: 1
