feature: $in validation

given:
  status: string, in [active, inactive, pending]
  priority: integer, in [1, 2, 3]
  level:
    $type: string
    $in: [low, medium, high]

scenarios:
  - name: optional fields absent
    when: {}
    then: []

  - name: value matches allowed string
    when:
      status: active
    then: []

  - name: value matches allowed integer
    when:
      priority: 2
    then: []

  - name: value matches allowed string via block syntax
    when:
      level: high
    then: []

  - name: string value not in allowed list
    when:
      status: cancelled
    then:
      - path: status
        code: "{{ CODE_IN }}"
        message: Value is not allowed
        data:
          in: [active, inactive, pending]

  - name: integer value not in allowed list
    when:
      priority: 5
    then:
      - path: priority
        code: "{{ CODE_IN }}"
        message: Value is not allowed
        data:
          in: [1, 2, 3]

  - name: block syntax value not in allowed list
    when:
      level: critical
    then:
      - path: level
        code: "{{ CODE_IN }}"
        message: Value is not allowed
        data:
          in: [low, medium, high]
