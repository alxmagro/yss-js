feature: Numeric — lt

given:
  level:
    $type: integer
    $lt: 10

scenarios:
  - name: valid below boundary
    when:
      level: 9
    then: []

  - name: optional absent
    when: {}
    then: []

  - name: at boundary fails
    when:
      level: 10
    then:
      - path: level
        code: "{{ CODE_LT_INVALID }}"
        message: Value must be less than `10`
        data:
          lt: 10
          value: 10

  - name: above boundary fails
    when:
      level: 11
    then:
      - path: level
        code: "{{ CODE_LT_INVALID }}"
        message: Value must be less than `10`
        data:
          lt: 10
          value: 11
