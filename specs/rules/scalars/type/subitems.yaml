feature: Generic type syntax — array<T>

given:
  tags: array<string>
  scores: array<integer>
  matrix: array<array>

scenarios:
  - name: optional fields absent
    when: {}
    then: []

  - name: valid string items
    when:
      tags: [hello, world]
    then: []

  - name: valid integer items
    when:
      scores: [1, 2, 3]
    then: []

  - name: empty array
    when:
      tags: []
    then: []

  - name: nested arrays
    when:
      matrix: [[1, 2], [3, 4]]
    then: []

  - name: wrong item type in string array
    when:
      tags: [hello, 42]
    then:
      - path: tags[1]
        code: "{{ CODE_TYPE_MISMATCH }}"
        message: Unexpected type
        data:
          value: 42
          expected: string

  - name: wrong item type in integer array
    when:
      scores: [1, hello, 3]
    then:
      - path: scores[1]
        code: "{{ CODE_TYPE_MISMATCH }}"
        message: Unexpected type
        data:
          value: hello
          expected: integer
