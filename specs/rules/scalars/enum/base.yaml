feature: Enum validation

given:
  status: string, enum [active, inactive, pending]
  priority: integer, enum [1, 2, 3]
  level:
    $type: string
    $enum: [low, medium, high]

scenarios:
  - name: optional fields absent
    when: {}
    then: []

  - name: valid string enum value
    when:
      status: active
    then: []

  - name: valid integer enum value
    when:
      priority: 2
    then: []

  - name: valid block syntax enum
    when:
      level: high
    then: []

  - name: string not in enum
    when:
      status: cancelled
    then:
      - path: status
        code: "{{ CODE_ENUM_INVALID }}"
        message: Value `cancelled` is not allowed
        data:
          value: cancelled
          enum: [active, inactive, pending]

  - name: integer not in enum
    when:
      priority: 5
    then:
      - path: priority
        code: "{{ CODE_ENUM_INVALID }}"
        message: Value `5` is not allowed
        data:
          value: 5
          enum: [1, 2, 3]

  - name: block syntax value not in enum
    when:
      level: critical
    then:
      - path: level
        code: "{{ CODE_ENUM_INVALID }}"
        message: Value `critical` is not allowed
        data:
          value: critical
          enum: [low, medium, high]
