feature: AllOf composite — Base validation

given:
  tags:
    $type: array
    $all_of:
      - $contains: string, == featured
      - $contains: string, == sale

errors:
  - &allof_invalid
    code: "{{ CODE_ALL_OF }}"
    message: Value does not match all conditions

scenarios:
  - name: optional field absent
    when: {}
    then: []

  - name: all branches match
    when:
      tags: [featured, sale, new]
    then: []

  - name: first branch fails
    when:
      tags: [sale, new]
    then:
      - <<: *allof_invalid
        path: tags
        data:
          failed_at: 0

  - name: second branch fails
    when:
      tags: [featured, new]
    then:
      - <<: *allof_invalid
        path: tags
        data:
          failed_at: 1

  - name: all branches fail
    when:
      tags: [new, clearance]
    then:
      - <<: *allof_invalid
        path: tags
        data:
          failed_at: 0
