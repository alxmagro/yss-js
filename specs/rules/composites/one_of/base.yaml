feature: OneOf composite — Base validation

given:
  shipment:
    $one_of:
      - $required: [delivery]
        delivery:
          $required: [address]
          address: string
          carrier: string
          status: string, in [pending, shipped, delivered, returned]
      - $required: [pickup]
        pickup:
          $required: [location]
          location: string
          slot: string

errors:
  - &oneof_invalid
    code: "{{ CODE_ONEOF_INVALID }}"
    message: Value does not match any condition
  - &oneof_multiple
    code: "{{ CODE_ONEOF_MULTIPLE }}"
    message: Value matches more than one condition

scenarios:
  - name: optional field absent
    when: {}
    then: []

  - name: matches first branch
    when:
      shipment:
        delivery:
          address: 1977 Tatooine Ave, Mos Eisley
          carrier: Falcon Cargo
          status: pending
    then: []

  - name: matches first branch with only required fields
    when:
      shipment:
        delivery:
          address: 66 Order St, Coruscant
    then: []

  - name: matches second branch
    when:
      shipment:
        pickup:
          location: Mos Eisley Cantina
          slot: "14:00"
    then: []

  - name: matches both branches
    when:
      shipment:
        delivery:
          address: 1977 Tatooine Ave, Mos Eisley
        pickup:
          location: Mos Eisley Cantina
    then:
      - <<: *oneof_multiple
        path: shipment
        data:
          matches_at: [0, 1]

  - name: no branch matches
    when:
      shipment: {}
    then:
      - <<: *oneof_invalid
        path: shipment
