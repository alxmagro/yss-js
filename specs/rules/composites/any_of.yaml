feature: AnyOf composite validation

given:
  order:
    $required: [buyer, country]
    buyer: string
    country: string
    $any_of:
      - country: string, == US
      - $required: [shipping]
        shipping:
          $required: [method, cost]
          method: string, enum [standard, express, pickup]
          cost: number, >= 0
          tracking:
            code: string
            carrier: string
            status: string, enum [pending, shipped, delivered, returned]

errors:
  - &anyof_invalid
    code: "{{ CODE_ANYOF_INVALID }}"
    message: Value does not match any condition

scenarios:
  - name: optional field absent
    when: {}
    then: []

  - name: matches first branch
    when:
      order:
        buyer: Luke Skywalker
        country: US
    then: []

  - name: matches second branch
    when:
      order:
        buyer: Han Solo
        country: BR
        shipping:
          method: standard
          cost: 15.50
    then: []

  - name: matches second branch with nested fields
    when:
      order:
        buyer: Leia Organa
        country: FR
        shipping:
          method: express
          cost: 30.00
          tracking:
            code: TRK-1977
            carrier: Falcon Cargo
            status: shipped
    then: []

  - name: matches both branches
    when:
      order:
        buyer: Obi-Wan Kenobi
        country: US
        shipping:
          method: pickup
          cost: 0
    then: []

  - name: no branch matches
    when:
      order:
        buyer: Darth Vader
        country: DE
    then:
      - <<: *anyof_invalid
        path: order

  - name: no branch matches due to nested validation failure
    when:
      order:
        buyer: Boba Fett
        country: AU
        shipping:
          method: drone
          cost: 20.00
    then:
      - <<: *anyof_invalid
        path: order
