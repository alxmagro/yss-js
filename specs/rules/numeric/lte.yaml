feature: Numeric — lte

given:
  score:
    $type: Float
    $lte: 100

scenarios:
  - name: valid at boundary
    when:
      score: 100.0
    then: []

  - name: valid below boundary
    when:
      score: 99.9
    then: []

  - name: optional absent
    when: {}
    then: []

  - name: above boundary fails
    when:
      score: 100.1
    then:
      - path: score
        code: "{{ CODE_LTE_INVALID }}"
        message: Value must be less than or equal to `100`
        data:
          lte: 100
          value: 100.1
