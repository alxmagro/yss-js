feature: Numeric — gte

given:
  age:
    $type: Integer
    $gte: 18

scenarios:
  - name: valid at boundary
    when:
      age: 18
    then: []

  - name: valid above boundary
    when:
      age: 20
    then: []

  - name: optional absent
    when: {}
    then: []

  - name: below boundary
    when:
      age: 17
    then:
      - path: age
        code: "{{ CODE_GTE_INVALID }}"
        message: Value must be greater than or equal to `18`
        data:
          gte: 18
          value: 17
