feature: Max validation

given:
  name:
    $type: String
    $max: 5
  tags:
    $type: List
    $max: 3
    $item:
      $type: String

scenarios:
  - name: valid values below max
    when:
      name: Lu
      tags: [a, b]
    then: []

  - name: valid values at max
    when:
      name: Hello
      tags: [a, b, c]
    then: []

  - name: optional fields absent
    when: {}
    then: []

  - name: string above max
    when:
      name: HelloWorld
    then:
      - path: name
        code: "{{ CODE_MAX_INVALID }}"
        message: Maximum size is `5`
        data:
          max: 5
          value: HelloWorld
          size: 10

  - name: list above max
    when:
      tags: [a, b, c, d]
    then:
      - path: tags
        code: "{{ CODE_MAX_INVALID }}"
        message: Maximum size is `3`
        data:
          max: 3
          value: [a, b, c, d]
          size: 4
