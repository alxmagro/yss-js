feature: Strict mode — cascading to nested objects

given:
  user:
    $strict: true
    name: String
    address:
      street: String
      city:   String
    meta:
      $strict: false
      source: String
      extra:
        key: String

scenarios:
  - name: valid — declared fields only
    when:
      user:
        name: Luke
        address:
          street: Tatooine Ave
          city: Mos Eisley
        meta:
          source: api
    then: []

  - name: unexpected field on root strict object
    when:
      user:
        name: Luke
        role: jedi
    then:
      - path: user.role
        code: "{{ CODE_PROP_UNEXPECTED }}"
        message: Unexpected property `user.role`

  - name: unexpected field on nested object — inherits strict
    when:
      user:
        name: Luke
        address:
          street: Tatooine Ave
          city: Mos Eisley
          planet: Tatooine
    then:
      - path: user.address.planet
        code: "{{ CODE_PROP_UNEXPECTED }}"
        message: Unexpected property `user.address.planet`

  - name: extra field on meta — opt out with $strict false
    when:
      user:
        name: Luke
        meta:
          source: api
          anything: goes
    then: []

  - name: extra field on extra — inherits open from meta
    when:
      user:
        name: Luke
        meta:
          source: api
          extra:
            key: value
            unknown: field
    then: []
