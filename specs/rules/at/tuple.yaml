feature: At validation — Tuples

given:
  point:
    $type: Tuple
    $at:
      0: Float
      1: Float

scenarios:
  - name: valid tuple
    when:
      point: [1.5, 2.5]
    then: []

  - name: tuple wrong length
    when:
      point: [1.5]
    then:
      - path: point
        code: "{{ CODE_TUPLE_LENGTH_INVALID }}"
        message: Expected tuple of length `2`, got `1`
        data:
          value: [1.5]
          size: 1
          expected: 2

  - name: tuple wrong type at position
    when:
      point: [x, 2.5]
    then:
      - path: point[0]
        code: "{{ CODE_TYPE_MISMATCH }}"
        message: Unexpected type
        data:
          value: x
          expected: Float
