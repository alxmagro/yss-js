feature: At validation — Lists

given:
  token:
    $type: List
    $at:
      0:
        $type: String
        $enum: [HS256, RS256]

scenarios:
  - name: valid — first item matches, rest ignored
    when:
      token: [HS256, eyJhbGci, eyJzdWIi]
    then: []

  - name: required position absent
    when:
      token: []
    then:
      - path: token[0]
        code: "{{ CODE_LIST_POSITION_MISSING }}"
        message: Position `0` is required but list has `0` items
        data:
          value: []
          size: 0

  - name: invalid value at position
    when:
      token: [MD5, eyJhbGci, eyJzdWIi]
    then:
      - path: token[0]
        code: "{{ CODE_ENUM_INVALID }}"
        message: Value `MD5` is not allowed
        data:
          value: MD5
          enum: [HS256, RS256]
