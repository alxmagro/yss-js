feature: Parser — inline unique constraint

scenarios:
  - name: array with unique items
    given:
      tags: "array, unique"
    when:
      tags: [a, b, c]
    then: []

  - name: array with duplicate items fails
    given:
      tags: "array, unique"
    when:
      tags: [a, b, a]
    then:
      - path: tags
        code: "{{ CODE_UNIQUE }}"
        message: Array contains duplicated items
