feature: Parser — root string schema

scenarios:
  - name: valid string payload
    given:
      $type: string
    when: Hello World
    then: []

  - name: wrong type payload
    given:
      $type: string
    when: 42
    then:
      - path: ""
        code: "{{ CODE_TYPE }}"
        message: Unexpected type
        data:
          expected: string
