feature: Parser — invalid schema inputs

scenarios:
  - name: non-object root throws
    given: "string"
    then_throws: YSS schema root must be an object

  - name: unexpected field value type throws
    given:
      age: 42
    then_throws: "Unexpected schema value: 42"

  - name: array field definition throws
    given:
      status:
        - string
        - integer
    then_throws: >-
      Array field definitions are not supported.
      Use "$type: [a, b]" for union types or "$any_of" for composite validation.
