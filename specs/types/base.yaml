feature: Type validation

given:
  str:   String
  int:   Integer
  float: Float
  bool:  Boolean
  nil:   null
  any:   any
  list:  List
  obj:   Object

scenarios:
  - name: all types valid
    when:
      str:   hello
      int:   42
      float: 3.14
      bool:  true
      nil:   null
      any:   anything
      obj:
        key: value
    then: []

  - name: any accepts all value types
    when:
      - any: 42
      - any: string
      - any: true
      - any: null
      - any: [1, 2]
      - any:
          key: value
    then: []

  - name: string wrong type
    when:
      str: 42
    then:
      - path: str
        code: "{{ CODE_TYPE_MISMATCH }}"
        message: Unexpected type
        data:
          value: 42
          expected: String

  - name: integer wrong type
    when:
      int: 3.14
    then:
      - path: int
        code: "{{ CODE_TYPE_MISMATCH }}"
        message: Unexpected type
        data:
          value: 3.14
          expected: Integer

  - name: float wrong type
    when:
      float: hello
    then:
      - path: float
        code: "{{ CODE_TYPE_MISMATCH }}"
        message: Unexpected type
        data:
          value: hello
          expected: Float

  - name: boolean wrong type
    when:
      bool: 1
    then:
      - path: bool
        code: "{{ CODE_TYPE_MISMATCH }}"
        message: Unexpected type
        data:
          value: 1
          expected: Boolean

  - name: null wrong type
    when:
      nil: hello
    then:
      - path: nil
        code: "{{ CODE_TYPE_MISMATCH }}"
        message: Unexpected type
        data:
          value: hello
          expected: "null"

  - name: object wrong type
    when:
      obj: [1, 2]
    then:
      - path: obj
        code: "{{ CODE_TYPE_MISMATCH }}"
        message: Unexpected type
        data:
          value: [1, 2]
          expected: Object
