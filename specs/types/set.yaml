feature: Set type — array with unique items

given:
  tags:
    $type: Set
    $item:
      $type: String

scenarios:
  - name: optional absent
    when: {}
    then: []

  - name: empty set
    when:
      tags: []
    then: []

  - name: valid set
    when:
      tags: [jedi, pilot, hero]
    then: []

  - name: duplicates rejected
    when:
      tags: [jedi, pilot, jedi]
    then:
      - path: tags
        code: "{{ CODE_SET_DUPLICATED }}"
        message: Set contains duplicated items

  - name: wrong type
    when:
      tags: hello
    then:
      - path: tags
        code: "{{ CODE_TYPE_MISMATCH }}"
        message: Unexpected type
        data:
          value: hello
          expected: Set
