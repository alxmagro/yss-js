feature: Tuple type — array with fixed items

given:
  point:
    $type: Tuple
    $at:
      0: Float
      1: Float
  pair:
    $type: Tuple
    $at:
      0: String
      1: Integer

scenarios:
  - name: optional fields absent
    when: {}
    then: []

  - name: valid tuple
    when:
      point: [1.5, 2.5]
      pair: [hello, 42]
    then: []

  - name: wrong type
    when:
      point: hello
    then:
      - path: point
        code: "{{ CODE_TYPE_MISMATCH }}"
        message: Unexpected type
        data:
          value: hello
          expected: Tuple

  - name: too few elements
    when:
      point: [1.5]
    then:
      - path: point
        code: "{{ CODE_TUPLE_LENGTH_INVALID }}"
        message: Expected tuple of length `2`, got `1`
        data:
          value: [1.5]
          size: 1
          expected: 2

  - name: too many elements
    when:
      point: [1.5, 2.5, 3.5]
    then:
      - path: point
        code: "{{ CODE_TUPLE_LENGTH_INVALID }}"
        message: Expected tuple of length `2`, got `3`
        data:
          value: [1.5, 2.5, 3.5]
          size: 3
          expected: 2
